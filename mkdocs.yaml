site_name: Harbor
site_description: Lightweight service registry and proxy controller
repo_url: https://github.com/benallard/harbor
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Configuration: configuration.md
  - Routes: routes.md
  - Backends: backends.md
  - Sidecars: sidecars.md
  - Gangway: gangway.md
  - Debugging:
    - Caddy: debugging-caddy.md
    - Envoy: debugging-envoy.md

plugins:
  - search
  - mike:
      alias_type: symlink
      canonical_version: latest
