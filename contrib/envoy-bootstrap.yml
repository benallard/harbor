node:
  id: harbor-envoy
  cluster: local

dynamic_resources:
  cds_config:
    resource_api_version: V3
    path_config_source:
      path: /run/envoy/cds.yaml
      watched_directory:
        path: /run/envoy
  lds_config:
    resource_api_version: V3
    path_config_source:
      path: /run/envoy/lds.yaml
      watched_directory:
        path: /run/envoy

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901